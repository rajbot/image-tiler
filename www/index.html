<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tiler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            margin: 0;
            padding: 10px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .header h1 a {
            color: inherit;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .header h1 a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .main-content {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 15px;
            align-items: start;
        }

        .sidebar {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .canvas-area {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            background: #e8edff;
            border-color: #4c63d2;
            transform: translateY(-2px);
        }

        .drop-zone input {
            display: none;
        }

        .drop-zone-text {
            color: #667eea;
            font-weight: 600;
            margin-top: 10px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 20px 0 10px 0;
            color: #444;
        }

        .drag-hint {
            font-size: 0.85rem;
            color: #667eea;
            margin: -5px 0 10px 0;
            font-style: italic;
        }

        .image-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 10px;
        }

        .image-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            position: relative;
        }

        .image-item:last-child {
            border-bottom: none;
        }

        .image-item.selected {
            background: #e8edff;
            border: 2px solid #667eea;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .image-item.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
        }

        .image-item {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .image-item:hover {
            background: #f8f9ff;
        }

        .image-item.drag-over {
            border-top: 3px solid #667eea;
            margin-top: 3px;
        }

        .image-item img {
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .image-info {
            flex-grow: 1;
            min-width: 0; /* Allow flex item to shrink below content size */
        }

        .image-name {
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .image-size {
            font-size: 0.8rem;
            color: #666;
        }

        .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            min-width: 20px; /* Prevent shrinking */
            min-height: 20px; /* Prevent shrinking */
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; /* Don't let this button shrink in flex layout */
        }

        .remove-btn:hover {
            background: #ff3742;
        }

        .controls {
            margin: 20px 0;
        }

        .grid-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }

        .grid-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-input-group label {
            font-weight: 500;
            color: #374151;
            min-width: 70px;
            font-size: 0.9rem;
        }

        .grid-input {
            padding: 8px 12px;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            width: 80px;
            text-align: center;
        }

        .grid-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #48cae4;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #39b9d1;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #ff3742;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .export-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .export-controls label {
            font-weight: 500;
            color: #374151;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .export-controls select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .export-size-dropdown {
            min-width: 150px;
        }

        .canvas-container {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #canvas {
            width: 100%;
            max-width: 100%;
            height: auto;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .image-details {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9ff;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .image-details .section-title {
            margin: 0 0 10px 0;
            font-size: 1rem;
        }

        .details-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-label {
            font-weight: 500;
            color: #374151;
        }

        .detail-value {
            color: #6b7280;
            font-family: 'Courier New', monospace;
            background: #ffffff;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #e5e7eb;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zoom-input {
            width: 80px;
            padding: 4px 8px;
            border: 1px solid #e5e7eb;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            background: #ffffff;
            color: #6b7280;
            text-align: center;
        }

        .zoom-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .zoom-percent {
            color: #6b7280;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
        }

        .zoom-reset-btn {
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .zoom-reset-btn:hover {
            background: #5a6fd8;
        }

        .offset-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .offset-input {
            width: 80px;
            padding: 4px 8px;
            border: 1px solid #e5e7eb;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            background: #ffffff;
            color: #6b7280;
            text-align: center;
        }

        .offset-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .offset-separator {
            color: #9ca3af;
            font-weight: bold;
            margin: 0 2px;
        }

        .offset-unit {
            color: #6b7280;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
        }

        .offset-reset-btn {
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .offset-reset-btn:hover {
            background: #5a6fd8;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 10px 0;
        }

        .section-header .section-title {
            margin: 0;
        }

        .grid-toggle-btn {
            padding: 4px 12px;
            background: #48cae4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s ease;
            white-space: nowrap;
        }

        .grid-toggle-btn:hover {
            background: #39b9d1;
        }

        .grid-toggle-btn.active {
            background: #667eea;
        }

        .grid-toggle-btn.active:hover {
            background: #5a6fd8;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #495057;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Better use of large screens */
        @media (min-width: 1400px) {
            .main-content {
                grid-template-columns: 300px 1fr;
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .grid-controls {
                gap: 10px;
            }
            
            .export-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🖼️ <a href="https://github.com/rajbot/image-tiler" target="_blank" rel="noopener noreferrer">Open-source</a> Image Tiler</h1>
            <p>Tile your images side-by-side or in a grid with WebAssembly-powered processing</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div id="drop-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
                    </svg>
                    <div class="drop-zone-text">
                        Drop images here or click to select
                    </div>
                    <input type="file" id="file-input" multiple accept="image/*">
                </div>

                <div class="section-title">Loaded Images</div>
                <div id="drag-hint" class="drag-hint" style="display: none;">Drag to rearrange</div>
                <div id="image-list" class="image-list">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8.5,13.5L11,16.5L14.5,12L19,18H5M21,19V5C21,3.89 20.1,3 19,3H5A2,2 0 0,0 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19Z" />
                        </svg>
                        <p>No images loaded yet</p>
                    </div>
                </div>

                <div class="section-title">Grid Layout</div>
                <div class="controls">
                    <div class="grid-controls">
                        <div class="grid-input-group">
                            <label for="grid-rows">Rows:</label>
                            <input type="number" id="grid-rows" class="grid-input" min="1" max="10" value="1">
                        </div>
                        <div class="grid-input-group">
                            <label for="grid-cols">Columns:</label>
                            <input type="number" id="grid-cols" class="grid-input" min="1" max="10" value="2">
                        </div>
                        <button id="apply-grid" class="btn btn-primary">Apply Grid</button>
                    </div>

                    <div class="export-controls">
                        <label for="export-size">Size:</label>
                        <select id="export-size" class="export-size-dropdown">
                            <option value="original">Original</option>
                        </select>
                        <select id="export-format">
                            <option value="png">PNG</option>
                            <option value="jpeg">JPEG</option>
                            <option value="webp">WebP</option>
                        </select>
                        <button id="export-btn" class="btn btn-primary" disabled>Export Image</button>
                    </div>

                </div>
            </div>

            <div class="canvas-area">
                <div class="section-header">
                    <div class="section-title">Preview</div>
                    <button id="grid-toggle-btn" class="grid-toggle-btn">Grid: Off</button>
                </div>
                <div class="canvas-container">
                    <canvas id="canvas"></canvas>
                </div>
                <div id="image-details" class="image-details" style="display: none;">
                    <div class="section-title">Image Details</div>
                    <div class="details-content">
                        <div class="detail-item">
                            <span class="detail-label">Name:</span>
                            <span id="detail-name" class="detail-value">-</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Dimensions:</span>
                            <span id="detail-dimensions" class="detail-value">-</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Zoom:</span>
                            <div class="zoom-controls">
                                <input type="number" id="zoom-input" class="zoom-input" 
                                       min="10" max="500" value="100" step="10">
                                <span class="zoom-percent">%</span>
                                <button id="zoom-reset" class="zoom-reset-btn">Reset</button>
                            </div>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Pan X/Y:</span>
                            <div class="offset-controls">
                                <input type="number" id="offset-x-input" class="offset-input" 
                                       min="-10000" max="10000" value="0" step="10" placeholder="X">
                                <span class="offset-separator">,</span>
                                <input type="number" id="offset-y-input" class="offset-input" 
                                       min="-10000" max="10000" value="0" step="10" placeholder="Y">
                                <span class="offset-unit">px</span>
                                <button id="offset-reset" class="offset-reset-btn">Reset</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="status" class="status">Initializing...</div>
            </div>
        </div>
    </div>

</body>
</html>
