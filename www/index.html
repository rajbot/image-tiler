<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tiler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            align-items: start;
        }

        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .canvas-area {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            background: #e8edff;
            border-color: #4c63d2;
            transform: translateY(-2px);
        }

        .drop-zone input {
            display: none;
        }

        .drop-zone-text {
            color: #667eea;
            font-weight: 600;
            margin-top: 10px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 20px 0 10px 0;
            color: #444;
        }

        .image-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 10px;
        }

        .image-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            position: relative;
        }

        .image-item:last-child {
            border-bottom: none;
        }

        .image-item img {
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .image-info {
            flex-grow: 1;
        }

        .image-name {
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .image-size {
            font-size: 0.8rem;
            color: #666;
        }

        .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn:hover {
            background: #ff3742;
        }

        .controls {
            margin: 20px 0;
        }

        .tile-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #48cae4;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #39b9d1;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #ff3742;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .export-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .export-controls select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .canvas-container {
            margin-top: 20px;
        }

        #canvas {
            max-width: 100%;
            height: auto;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #495057;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .tile-buttons {
                flex-direction: column;
            }
            
            .export-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🖼️ Image Tiler</h1>
            <p>Tile your images side-by-side or in a 2x2 grid with WebAssembly-powered processing</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div id="drop-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
                    </svg>
                    <div class="drop-zone-text">
                        Drop images here or click to select
                    </div>
                    <input type="file" id="file-input" multiple accept="image/*">
                </div>

                <div class="section-title">Loaded Images</div>
                <div id="image-list" class="image-list">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8.5,13.5L11,16.5L14.5,12L19,18H5M21,19V5C21,3.89 20.1,3 19,3H5A2,2 0 0,0 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19Z" />
                        </svg>
                        <p>No images loaded yet</p>
                    </div>
                </div>

                <div class="section-title">Tiling Options</div>
                <div class="controls">
                    <div class="tile-buttons">
                        <button id="tile-2x1" class="btn btn-primary" disabled>2x1 Tile</button>
                        <button id="tile-2x2" class="btn btn-secondary" disabled>2x2 Tile</button>
                    </div>

                    <div class="export-controls">
                        <select id="export-format">
                            <option value="png">PNG</option>
                            <option value="jpeg">JPEG</option>
                            <option value="webp">WebP</option>
                        </select>
                        <button id="export-btn" class="btn btn-primary" disabled>Export Image</button>
                    </div>

                    <button id="clear-btn" class="btn btn-danger">Clear All</button>
                </div>
            </div>

            <div class="canvas-area">
                <div class="section-title">Preview</div>
                <div class="canvas-container">
                    <canvas id="canvas" width="800" height="600"></canvas>
                </div>
                <div id="status" class="status">Initializing...</div>
            </div>
        </div>
    </div>

</body>
</html>
